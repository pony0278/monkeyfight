name: Deploy to GitHub Pages

# Auto-publishes the game to GitHub Pages so it can be play-tested in the browser.
# Runs on every push to the development branch (and can be triggered manually).
on:
  push:
    branches:
      - claude/magical-lamport-ofw1al
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only keep the latest deployment; cancel superseded in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Enables Pages automatically (build_type: workflow) if it isn't already.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # The site is already static — upload the whole repo as the artifact.
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
